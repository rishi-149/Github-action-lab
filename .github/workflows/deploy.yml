name: Build and Deploy DevOps Lab 9

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_NAME: devopslab9

jobs:
  build:
    name: Build and Upload Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate artifact
        run: |
          echo "<!-- Built: $(date) -->" >> index.html

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}
          path: ./

  deploy_dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: Dev-env
      url: https://dev.${{ env.APP_NAME }}.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}

      - name: Simulate Development Deployment
        run: |
          echo "Deploying to DEVELOPMENT: https://dev.${{ env.APP_NAME }}.com"
          cat index.html

  deploy_staging:
    name: Promote to Staging
    runs-on: ubuntu-latest
    needs: deploy_dev

    environment:
      name: Test-env
      url: https://staging.${{ env.APP_NAME }}.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}

      - name: Simulate Staging Deployment
        run: |
          echo "Deploying to STAGING: https://staging.${{ env.APP_NAME }}.com"
          cat index.html

  deploy_prod:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: deploy_staging

    environment:
      name: Prod-env
      url: https://${{ env.APP_NAME }}.com

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}

      - name: Simulate Production Deployment
        run: |
          echo "Deploying to PRODUCTION: https://${{ env.APP_NAME }}.com"
          cat index.html
